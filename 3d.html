<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>3D Animated Box Loader | Pure CSS</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 30% 20%, #0a0f1e, #03050b);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* floating particle effect (optional background magic) */
    body::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background-image: radial-gradient(2px 2px at 15% 40%, rgba(139, 92, 246, 0.3), transparent),
                        radial-gradient(3px 3px at 80% 70%, rgba(0, 212, 255, 0.2), transparent);
      background-size: 60px 60px, 80px 80px;
      animation: drift 40s linear infinite;
      pointer-events: none;
    }

    @keyframes drift {
      0% { background-position: 0% 0%, 0% 0%; }
      100% { background-position: 200% 150%, 300% 200%; }
    }

    /* main loader container */
    .loader-container {
      perspective: 800px;
      width: 200px;
      height: 200px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 3D cube wrapper */
    .cube {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      animation: spinCube 3s infinite cubic-bezier(0.68, -0.55, 0.265, 1.55);
      will-change: transform;
    }

    /* common face styles */
    .face {
      position: absolute;
      width: 200px;
      height: 200px;
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.85), rgba(168, 85, 247, 0.85));
      border: 2px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 0 20px rgba(168, 85, 247, 0.5);
      backdrop-filter: blur(2px);
      border-radius: 12px;
      transition: all 0.2s;
    }

    /* individual face transformations */
    .front  { transform: translateZ(100px); }
    .back   { transform: rotateY(180deg) translateZ(100px); }
    .right  { transform: rotateY(90deg) translateZ(100px); }
    .left   { transform: rotateY(-90deg) translateZ(100px); }
    .top    { transform: rotateX(90deg) translateZ(100px); }
    .bottom { transform: rotateX(-90deg) translateZ(100px); }

    /* glowing inner reflection effect */
    .face::after {
      content: "";
      position: absolute;
      top: 10%;
      left: 10%;
      width: 80%;
      height: 80%;
      background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0) 80%);
      border-radius: 8px;
      pointer-events: none;
    }

    /* add a subtle pulsing glow to each face */
    @keyframes faceGlow {
      0% { box-shadow: 0 0 5px rgba(168, 85, 247, 0.4); border-color: rgba(255,255,255,0.2);}
      50% { box-shadow: 0 0 25px rgba(168, 85, 247, 0.9); border-color: rgba(255,255,255,0.6);}
      100% { box-shadow: 0 0 5px rgba(168, 85, 247, 0.4); border-color: rgba(255,255,255,0.2);}
    }

    .face {
      animation: faceGlow 2s infinite ease-in-out;
    }

    /* slightly delay each face for a wave effect */
    .front  { animation-delay: 0s; }
    .back   { animation-delay: 0.2s; }
    .right  { animation-delay: 0.4s; }
    .left   { animation-delay: 0.6s; }
    .top    { animation-delay: 0.8s; }
    .bottom { animation-delay: 1s; }

    /* cube rotation keyframes */
    @keyframes spinCube {
      0% {
        transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg);
      }
      25% {
        transform: rotateX(90deg) rotateY(45deg) rotateZ(15deg);
      }
      50% {
        transform: rotateX(180deg) rotateY(90deg) rotateZ(30deg);
      }
      75% {
        transform: rotateX(270deg) rotateY(135deg) rotateZ(45deg);
      }
      100% {
        transform: rotateX(360deg) rotateY(180deg) rotateZ(60deg);
      }
    }

    /* Optional floating shadow beneath cube */
    .shadow {
      position: absolute;
      bottom: -40px;
      left: 50%;
      transform: translateX(-50%);
      width: 160px;
      height: 30px;
      background: radial-gradient(ellipse, rgba(0,0,0,0.6), transparent 70%);
      border-radius: 50%;
      filter: blur(8px);
      animation: shadowPulse 1.5s infinite alternate;
    }

    @keyframes shadowPulse {
      0% { opacity: 0.4; transform: translateX(-50%) scale(0.9); }
      100% { opacity: 0.8; transform: translateX(-50%) scale(1.1); }
    }

    /* loader text */
    .loader-text {
      margin-top: 40px;
      text-align: center;
      color: #b9c7e9;
      font-weight: 500;
      letter-spacing: 1px;
      font-size: 1.1rem;
      text-transform: uppercase;
      background: linear-gradient(120deg, #c084fc, #60a5fa);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      animation: textPulse 1.8s infinite;
    }

    @keyframes textPulse {
      0% { opacity: 0.5; letter-spacing: 1px; }
      100% { opacity: 1; letter-spacing: 3px; }
    }

    /* responsive adjustments */
    @media (max-width: 500px) {
      .loader-container {
        width: 150px;
        height: 150px;
      }
      .face {
        width: 150px;
        height: 150px;
      }
      .front  { transform: translateZ(75px); }
      .back   { transform: rotateY(180deg) translateZ(75px); }
      .right  { transform: rotateY(90deg) translateZ(75px); }
      .left   { transform: rotateY(-90deg) translateZ(75px); }
      .top    { transform: rotateX(90deg) translateZ(75px); }
      .bottom { transform: rotateX(-90deg) translateZ(75px); }
      .shadow {
        width: 120px;
        height: 20px;
        bottom: -30px;
      }
      .loader-text {
        font-size: 0.9rem;
        margin-top: 30px;
      }
    }
  </style>
</head>
<body>
  <div style="display: flex; flex-direction: column; align-items: center; justify-content: center;">
    <div class="loader-container">
      <div class="cube">
        <div class="face front"></div>
        <div class="face back"></div>
        <div class="face right"></div>
        <div class="face left"></div>
        <div class="face top"></div>
        <div class="face bottom"></div>
      </div>
      <div class="shadow"></div>
    </div>
    <div class="loader-text">LOADING • 3D CUBE</div>
  </div>
</body>
</html>
